            display: inline-block;

    </style>
</head>
<body>
<div>

<script>

        '03.1.mp4',
        '04.1.mp4',
        '07.1.mp4',
        '08.1.mp4',

        '11.1.mp4',
        '12.1.mp4'
    ];

    document.addEventListener('touchstart', function() {
        video.play();
    });

    video.addEventListener('ended', function() {

    });
</script>
